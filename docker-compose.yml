version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: kagrom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kagrom_sarlu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kagrom_postgres_data:/var/lib/postgresql/data

volumes:
  kagrom_postgres_data:
